<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fd1c5" stroke="none"/>
    </marker>
    <marker id="arr-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e8a87c" stroke="none"/>
    </marker>
    <marker id="arr-bi" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#55555f" stroke="none"/>
    </marker>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161619"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="440" fill="#0a0a0c" rx="12"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" fill="#e8e6e3" font-size="15" font-weight="600" letter-spacing="0.5">System Architecture — EDM Theremin</text>
  <line x1="350" y1="46" x2="650" y2="46" stroke="#1e1e24" stroke-width="1"/>

  <!-- ============ POWER (top center) ============ -->
  <rect x="340" y="60" width="140" height="44" rx="8" fill="url(#cg)" stroke="#e8a87c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="410" y="78" text-anchor="middle" fill="#e8a87c" font-size="9" font-weight="500" letter-spacing="1">POWER</text>
  <text x="410" y="94" text-anchor="middle" fill="#8a8a96" font-size="8.5">Battery / USB</text>

  <line x1="480" y1="82" x2="518" y2="82" stroke="#e8a87c" stroke-width="1.2" marker-end="url(#arr-w)"/>

  <rect x="523" y="60" width="140" height="44" rx="8" fill="url(#cg)" stroke="#e8a87c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="593" y="78" text-anchor="middle" fill="#e8a87c" font-size="9" font-weight="500" letter-spacing="1">REGULATOR</text>
  <text x="593" y="94" text-anchor="middle" fill="#8a8a96" font-size="8.5">Voltage regulation</text>

  <!-- Power down arrow -->
  <line x1="500" y1="104" x2="500" y2="130" stroke="#e8a87c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ INPUT (left) ============ -->
  <rect x="30" y="145" width="190" height="200" rx="10" fill="url(#cg)" stroke="#1e1e24" stroke-width="1"/>
  <rect x="30" y="145" width="190" height="3" rx="2" fill="#4fd1c5" opacity="0.6"/>
  <text x="125" y="172" text-anchor="middle" fill="#4fd1c5" font-size="10" font-weight="500" letter-spacing="1">MULTIMODAL INPUT</text>

  <rect x="48" y="190" width="154" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="125" y="208" text-anchor="middle" fill="#8a8a96" font-size="9">Time-of-Flight Sensor</text>

  <rect x="48" y="224" width="154" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="125" y="242" text-anchor="middle" fill="#8a8a96" font-size="9">Hall Effect Sensor</text>

  <rect x="48" y="258" width="154" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="125" y="276" text-anchor="middle" fill="#8a8a96" font-size="9">Microphone</text>

  <rect x="48" y="292" width="154" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="125" y="310" text-anchor="middle" fill="#8a8a96" font-size="9">Buttons / Dials / Switches</text>

  <!-- Arrow: Input → MCU -->
  <line x1="220" y1="245" x2="268" y2="245" stroke="#4fd1c5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ MCU (center) ============ -->
  <rect x="273" y="135" width="455" height="220" rx="10" fill="url(#cg)" stroke="#4fd1c5" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="273" y="135" width="455" height="3" rx="2" fill="#a78bfa" opacity="0.5"/>
  <text x="500" y="162" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500" letter-spacing="1">MULTI-CORE MICROPROCESSOR (ESP32)</text>

  <!-- Core 1 -->
  <rect x="295" y="180" width="195" height="120" rx="8" fill="#1a1a20" stroke="#4fd1c5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="392" y="202" text-anchor="middle" fill="#4fd1c5" font-size="10" font-weight="500">Core 1</text>
  <text x="392" y="225" text-anchor="middle" fill="#8a8a96" font-size="9">GUI rendering</text>
  <text x="392" y="243" text-anchor="middle" fill="#8a8a96" font-size="9">Sensor reading</text>
  <text x="392" y="261" text-anchor="middle" fill="#8a8a96" font-size="9">Interrupt handling</text>
  <text x="392" y="279" text-anchor="middle" fill="#55555f" font-size="8">60 Hz display loop</text>

  <!-- Arrow between cores -->
  <line x1="490" y1="240" x2="510" y2="240" stroke="#55555f" stroke-width="1" marker-end="url(#arr-bi)"/>
  <line x1="510" y1="248" x2="490" y2="248" stroke="#55555f" stroke-width="1" marker-end="url(#arr-bi)"/>

  <!-- Core 2 -->
  <rect x="515" y="180" width="195" height="120" rx="8" fill="#1a1a20" stroke="#e8a87c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="612" y="202" text-anchor="middle" fill="#e8a87c" font-size="10" font-weight="500">Core 2</text>
  <text x="612" y="225" text-anchor="middle" fill="#8a8a96" font-size="9">Audio synthesis</text>
  <text x="612" y="243" text-anchor="middle" fill="#8a8a96" font-size="9">Sample playback</text>
  <text x="612" y="261" text-anchor="middle" fill="#8a8a96" font-size="9">Signal mixing</text>
  <text x="612" y="279" text-anchor="middle" fill="#55555f" font-size="8">Low-latency audio pipeline</text>

  <!-- Shared memory bar -->
  <rect x="295" y="310" width="415" height="30" rx="6" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="502" y="329" text-anchor="middle" fill="#55555f" font-size="9">Hardware Timer  ·  Shared Memory  ·  Inter-Core Communication</text>

  <!-- Arrow: MCU → Output -->
  <line x1="728" y1="245" x2="768" y2="245" stroke="#e8a87c" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- ============ OUTPUT (right) ============ -->
  <rect x="773" y="145" width="195" height="200" rx="10" fill="url(#cg)" stroke="#1e1e24" stroke-width="1"/>
  <rect x="773" y="145" width="195" height="3" rx="2" fill="#e8a87c" opacity="0.6"/>
  <text x="870" y="172" text-anchor="middle" fill="#e8a87c" font-size="10" font-weight="500" letter-spacing="1">OUTPUTS</text>

  <rect x="791" y="190" width="159" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="870" y="208" text-anchor="middle" fill="#8a8a96" font-size="9">Audio Out (DAC)</text>

  <rect x="791" y="224" width="159" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="870" y="242" text-anchor="middle" fill="#8a8a96" font-size="9">60 Hz Display</text>

  <rect x="791" y="258" width="159" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="870" y="276" text-anchor="middle" fill="#8a8a96" font-size="9">Status LEDs</text>

  <rect x="791" y="292" width="159" height="28" rx="5" fill="#1a1a20" stroke="#2a2a33" stroke-width="1"/>
  <text x="870" y="310" text-anchor="middle" fill="#8a8a96" font-size="9">Sensor Feedback</text>

  <!-- Footer -->
  <text x="500" y="400" text-anchor="middle" fill="#55555f" font-size="9" letter-spacing="0.5">ESP32 Dual-Core  ·  Real-Time Audio Synthesis  ·  Proximity-Driven Control  ·  LabVIEW Monitoring</text>

  <!-- Decorative corners -->
  <line x1="30" y1="430" x2="70" y2="430" stroke="#1e1e24" stroke-width="1"/>
  <line x1="30" y1="430" x2="30" y2="416" stroke="#1e1e24" stroke-width="1"/>
  <line x1="970" y1="430" x2="930" y2="430" stroke="#1e1e24" stroke-width="1"/>
  <line x1="970" y1="430" x2="970" y2="416" stroke="#1e1e24" stroke-width="1"/>

</svg>
